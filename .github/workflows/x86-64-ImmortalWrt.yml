name: x86-64-ImmortalWrt

on:
  workflow_dispatch:
  workflow_call:
  # schedule:
  #   - cron: "0 18 * * *"

permissions:
  contents: read
  actions: read

jobs:
  Build:
    uses: ./.github/workflows/Build-OpenWrt.yml
    secrets: inherit
    permissions:
      contents: write
      actions: write
    with:
      repo_url: https://github.com/immortalwrt/immortalwrt.git
      repo_branch: master
      config_file: configs/x86-64.config
      firmware_tag: x86-64
      kernel_file: kernel-6.18
      artifact_prefix: x86.64
      manifest_file: immortalwrt-x86-64-generic.manifest
      remove_sqm_scripts_nss: true
      release_summary: >-
        这是基于ImmortalWrt主线制作的固件，默认主题为Aurora(同时内置Argon备选)；在ImmortalWrt基础上定制：网络与系统——cpufreq、upnp、autoreboot、uhttpd、diskman、watchcat、nginx-full；代理与穿透——luci-app-openclash(OpenClash)、luci-app-lucky(Lucky大内网穿透)、luci-app-oaf(应用过滤)；推送与监控——luci-app-wechatpush(微信推送)、bandix(流量看板)；下载与管理——luci-app-openlist2、luci-app-aria2、luci-app-dockerman(Docker)、luci-app-gecoosac(无线AC控制器)；实用工具——tmux、htop、btop、nano-full、openssh-sftp-server、fdisk/cfdisk/sgdisk、tune2fs/fstrim、smartmontools、zram-swap、coremark、autocore、automount(USB自动挂载)、luci-mod-rpc/luci-compat/luci-lib-ipkg(LuCI兼容层)。出厂环境已按个人网络定制：LAN IP 10.0.0.1、主机名Athena、PPPoE拨号、关闭IPv6、双5G共享SSID无缝漫游+2.4G独立SSID、软件源南京大学镜像；WiFi与PPPoE凭据经仓库Secrets注入。详见x86-64.config与General.config。
