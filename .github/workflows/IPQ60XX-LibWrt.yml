name: IPQ60XX-LibWrt

on:
  workflow_dispatch:
  workflow_call:
  # schedule:
  #   - cron: "0 18 * * *"

permissions:
  contents: read
  actions: read

jobs:
  Build:
    uses: ./.github/workflows/Build-OpenWrt.yml
    secrets: inherit
    permissions:
      contents: write
      actions: write
    with:
      repo_url: https://github.com/laipeng668/openwrt-6.x.git
      repo_branch: 25.12-nss
      config_file: configs/IPQ60XX.config
      firmware_tag: IPQ60XX
      kernel_file: kernel-6.12
      artifact_prefix: IPQ60XX
      manifest_file: libwrt-qualcommax-ipq60xx.manifest
      release_summary: >-
        这是开启全功能NSS(11.4固件)的6.12内核固件，默认主题为Aurora(同时内置Argon备选)；在ImmortalWrt基础上定制：网络与系统——cpufreq、upnp、autoreboot、uhttpd、diskman、watchcat、luci-app-athena-led(京东云LED控制)；代理与穿透——luci-app-openclash(OpenClash)、luci-app-lucky(Lucky大内网穿透)、luci-app-oaf(应用过滤)；推送与监控——luci-app-wechatpush(微信推送)、bandix(流量看板)；实用工具——tmux、htop、btop、nano-full、openssh-sftp-server、fdisk/cfdisk/sgdisk、tune2fs/fstrim、smartmontools、zram-swap、coremark、autocore、automount(USB自动挂载)、luci-mod-rpc/luci-compat/luci-lib-ipkg(LuCI兼容层)。出厂环境已按个人网络定制：LAN IP 10.0.0.1、主机名Athena、PPPoE拨号、关闭IPv6、双5G(radio0/radio2)共享SSID无缝漫游+2.4G独立SSID、软件源南京大学镜像；WiFi与PPPoE凭据经仓库Secrets注入。详见IPQ60XX.config与General.config。
