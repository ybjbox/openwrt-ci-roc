name: x86-64-ImmortalWrt

on:
  workflow_dispatch:
  workflow_call:
  # schedule:
  #   - cron: "0 18 * * *"

permissions:
  contents: read
  actions: read

jobs:
  Build:
    uses: ./.github/workflows/Build-OpenWrt.yml
    secrets: inherit
    permissions:
      contents: write
      actions: write
    with:
      repo_url: https://github.com/immortalwrt/immortalwrt.git
      repo_branch: master
      config_file: configs/x86-64.config
      firmware_tag: x86-64
      kernel_file: kernel-6.18
      artifact_prefix: x86.64
      manifest_file: immortalwrt-x86-64-generic.manifest
      remove_sqm_scripts_nss: true
      release_summary: >-
        这是基于ImmortalWrt主线制作的固件，默认主题为Aurora；该固件在ImmortalWrt的基础上，添加了额外的软件包cpufreq、upnp、autoreboot、uhttpd、diskman、watchcat、luci-app-dockerman(Docker)、luci-theme-argon(Argon主题)、luci-app-wechatpush(微信推送)、luci-app-oaf(应用过滤)、luci-app-lucky(Lucky大内网穿透)、luci-app-openclash(OpenClash)、bandix(流量看板)，并添加了若干工具，具体详见x86-64.config和General.config。
